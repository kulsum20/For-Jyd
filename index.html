<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --champagne: #f7e7ce; --glow-soft: rgba(255, 215, 0, 0.12); }
        body { margin: 0; background: #05070a; color: var(--champagne); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #start-screen { position: fixed; inset: 0; background: #05070a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .unwrap-text { font-family: 'Playfair Display', serif; font-style: italic; letter-spacing: 2px; margin-bottom: 20px; color: var(--gold); }
        .btn { background: var(--gold); border: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; color: #0d1117; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; z-index: 10000; }

        #content { 
            display: none; width: 85%; max-width: 380px; z-index: 10; padding: 30px 20px; 
            border-radius: 35px; 
            background: rgba(30, 35, 45, 0.95);
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 215, 0, 0.2); 
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 20px var(--glow-soft);
        }

        .line { color: var(--gold); font-family: monospace; font-size: 0.8rem; text-align: left; margin: 8px 0; padding-left: 10px; border-left: 1px solid var(--gold); min-height: 1.2em; }

        h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; color: var(--gold); margin: 0; }
        .dino-bounce { display: inline-block; animation: boing 0.8s infinite alternate ease-in-out; }
        @keyframes boing { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .cake-container { height: 110px; width: 120px; margin: 30px auto; position: relative; }
        .layer { position: absolute; left: 10px; width: 100px; height: 25px; border-radius: 6px; opacity: 0; transform: translateY(10px); transition: 0.6s ease; }
        .bottom { background: #1a2a3a; bottom: 0; } 
        .mid { background: #243b55; bottom: 25px; } 
        .top { background: #2c5364; bottom: 50px; z-index: 5; }
        .icing { background: var(--gold); height: 8px; width: 108px; bottom: 75px; border-radius: 10px; position: absolute; left: 6px; opacity: 0; transition: 0.6s; box-shadow: 0 0 10px var(--gold); z-index: 6; }
        .visible { opacity: 1 !important; transform: translateY(0) !important; }

        .candle { width: 5px; height: 20px; background: #fff; border-radius: 2px; position: absolute; top: -20px; }
        .flame { 
            position: absolute; top: -12px; left: -2px; width: 9px; height: 13px; background: #ffa500; border-radius: 50%; 
            box-shadow: 0 0 8px #ffcc33; animation: flicker 0.1s infinite; 
        }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        /* FADE ANIMATION */
        .fade-in-text { opacity: 0; transition: opacity 1.5s ease-in-out; }

        #wish-box { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.85rem; color: var(--gold); margin: 20px 0; cursor: pointer; }
        #message { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.95rem; line-height: 1.7; text-align: center; min-height: 50px; }
        
        .footer { font-size: 0.65rem; color: var(--gold); letter-spacing: 2px; margin-top: 30px; font-weight: bold; }

        .sparkle { position: absolute; pointer-events: none; font-size: 20px; z-index: 1000; animation: sparkleOut 0.8s forwards; }
        @keyframes sparkleOut { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
