<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --champagne: #f7e7ce; }
        body { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #0d1117; color: var(--champagne); font-family: 'Montserrat', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; text-align: center; }
        .heart-tap { position: fixed; pointer-events: none; color: var(--gold); font-size: 20px; animation: floatUp 2s ease-out forwards; z-index: 1000; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-120px) scale(1.5); opacity: 0; } }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1c2531 0%, #0d1117 100%); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #scene { display: none; width: 90%; max-width: 450px; z-index: 10; padding: 30px 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); box-sizing: border-box; }
        h1 { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--gold); margin: 0 0 10px 0; }
        .subtitle { font-weight: 300; font-size: 14px; margin-bottom: 20px; }
        .dino-bounce { display: inline-block; animation: stomp 1.5s infinite; font-size: 24px; }
        .litt-mode { filter: drop-shadow(0 0 15px #00ff00); animation: stomp 1.5s infinite, glow 1s infinite alternate !important; }
        @keyframes glow { from { filter: drop-shadow(0 0 5px #00ff00); } to { filter: drop-shadow(0 0 20px #00ff00); } }
        @keyframes stomp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .cake { position: relative; width: 160px; height: 140px; margin: 0 auto; display: none; cursor: pointer; }
        .layer { position: absolute; width: 100%; height: 30px; border-radius: 5px; opacity: 0; transform: translateY(10px); transition: 0.8s; left:0; }
        .bottom { background: #1a2a3a; bottom: 0; }
        .middle { background: #243b55; bottom: 30px; }
        .top { background: #2c5364; bottom: 60px; }
        .icing { position: absolute; width: 100%; height: 8px; background: var(--gold); bottom: 90px; border-radius: 10px; opacity: 0; transition: 0.8s; left:0; }
        .show-layer { opacity: 1 !important; transform: translateY(0) !important; }
        .candle { position: absolute; width: 4px; height: 20px; background: white; bottom: 98px; opacity: 0; transition: 1s; }
        .flame { position: absolute; top: -10px; left: -2px; width: 8px; height: 10px; background: orange; border-radius: 50%; box-shadow: 0 0 10px orange; }
        #message { font-size: 15px; line-height: 1.6; font-style: italic; margin-top: 15px; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        .btn-start { background: var(--gold); color: #0d1117; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; border: none; font-family: 'Montserrat'; cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body onclick="spawnHeart(event)">
    <canvas id="starField"></canvas>
    <div id="start-screen">
        <h2 style="font-family:'Playfair Display'; letter-spacing:4px; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:30px;">OPEN INVITATION</h2>
        <button class="btn-start" id="startBtn">TAP TO ENTER ❤️</button>
    </div>
    <div id="scene">
        <h1 id="main-title">Happy Birthday Joydeep ❤️</h1>
        <div id="main-sub" class="subtitle">I love you my litt dinooo <span id="dino" class="dino-bounce">🦖</span></div>
        <div class="cake" id="the-cake" onclick="blowCandles()">
            <div class="layer bottom" id="l1"></div>
            <div class="layer middle" id="l2"></div>
            <div class="layer top" id="l3"></div>
            <div class="icing" id="icing"></div>
            <div class="candle" style="left:20%"><div class="flame"></div></div>
            <div class="candle" style="left:48%"><div class="flame"></div></div>
            <div class="candle" style="left:76%"><div class="flame"></div></div>
        </div>
        <div id="message"></div>
    </div>
    <audio id="music" loop><source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808f3030e.mp3" type="audio/mpeg"></audio>
    <script>
        const canvas = document.getElementById('starField');
        const ctx = canvas.getContext('2d');
        let particles = []; let isConfetti = false;
        document.getElementById('startBtn').addEventListener('click', function() {
            const song = document.getElementById('music');
            song.play().catch(() => { alert("Please ensure your volume is up!"); });
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('scene').style.display = 'block';
            showSurprise();
        });
        function spawnHeart(e) {
            const h = document.createElement('div'); h.className = 'heart-tap'; h.innerHTML = '✨';
            h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
            document.body.appendChild(h); setTimeout(() => h.remove(), 2000);
        }
        function showSurprise() {
            document.getElementById('the-cake').style.display = 'block';
            ['l1', 'l2', 'l3', 'icing'].forEach((id, idx) => {
                setTimeout(() => document.getElementById(id).classList.add('show-layer'), idx * 500);
            });
            setTimeout(() => {
                document.querySelectorAll('.candle').forEach(c => c.style.opacity = 1);
                typeLetter();
            }, 2500);
        }
        function typeLetter() {
            const text = "For me you're the best thing I can ever ask God for. Even tho merese zyada nakhre karte ho but mujhe tumhare nakhre uthna bhi pasand hai. Tumse gussa karna bhi and mere stupid se jokes pe tumhari cute si smile dekhna bhi… and that hot wink. I love you my sahib ji ❤️";
            let i = 0; const msgBox = document.getElementById('message');
            function typing() {
                if(i < text.length) { msgBox.innerHTML += text.charAt(i); i++; setTimeout(typing, 35); }
                else { document.getElementById('dino').classList.add('litt-mode');
                    setTimeout(() => { msgBox.innerHTML += "<br><br><span style='font-size: 0.8em; opacity: 0.6;'>Made with love for Joydeep ❤️</span>"; }, 1000);
                }
            }
            typing();
        }
        function blowCandles() {
            document.querySelectorAll('.flame').forEach(f => f.style.opacity = '0');
            isConfetti = true;
            for(let i=0; i<30; i++) { particles.push({ x: canvas.width/2, y: canvas.height/2, s: Math.random()*3, v: Math.random()*5 - 2.5, vx: Math.random()*10 - 5 }); }
        }
        function setup() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particles = []; for(let i=0; i<60; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5, v: Math.random()*0.5 });
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = isConfetti ? "gold" : "rgba(212, 175, 55, 0.4)";
            particles.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill(); p.y -= (p.v || 0.5); if(p.vx) p.x += p.vx; if(p.y < 0) p.y = canvas.height; });
            requestAnimationFrame(draw);
        }
        setup(); draw(); window.onresize = setup;
    </script>
</body>
</html>
