<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --champagne: #f7e7ce; }
        body { margin: 0; padding: 0; height: 100vh; width: 100vw; background: #0d1117; color: var(--champagne); font-family: 'Montserrat', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; text-align: center; }
        
        /* Start Screen */
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1c2531 0%, #0d1117 100%); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-start { background: var(--gold); color: #0d1117; padding: 18px 40px; border-radius: 50px; font-weight: bold; font-size: 18px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }

        /* Main Scene */
        #scene { display: none; width: 90%; max-width: 450px; z-index: 10; padding: 30px 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); box-sizing: border-box; }
        
        /* Search/Boot Sequence */
        #boot-sequence { font-family: monospace; color: var(--gold); font-size: 14px; line-height: 2.2; text-align: left; margin-bottom: 20px; }
        
        /* Content Elements */
        h1 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); margin: 0; display: none; }
        .subtitle { font-weight: 300; font-size: 14px; margin-bottom: 20px; display: none; }
        
        /* The Cake */
        .cake { position: relative; width: 160px; height: 140px; margin: 20px auto; display: none; }
        .layer { position: absolute; width: 100%; height: 30px; border-radius: 5px; opacity: 0; transform: translateY(10px); transition: 0.8s; left:0; }
        .bottom { background: #1a2a3a; bottom: 0; }
        .middle { background: #243b55; bottom: 30px; }
        .top { background: #2c5364; bottom: 60px; }
        .icing { position: absolute; width: 100%; height: 8px; background: var(--gold); bottom: 90px; border-radius: 10px; opacity: 0; transition: 0.8s; left:0; }
        .show-layer { opacity: 1 !important; transform: translateY(0) !important; }
        .candle { position: absolute; width: 4px; height: 20px; background: white; bottom: 98px; left: 48%; opacity: 0; transition: 1s; }
        .flame { position: absolute; top: -10px; left: -2px; width: 8px; height: 10px; background: orange; border-radius: 50%; box-shadow: 0 0 10px orange; animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Dino & Message */
        .dino-bounce { display: inline-block; animation: stomp 1.5s infinite; font-size: 24px; }
        @keyframes stomp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        #message { font-size: 14px; line-height: 1.6; font-style: italic; margin-top: 15px; min-height: 120px; color: var(--champagne); }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-family:'Playfair Display'; letter-spacing:4px; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:30px;">OPEN INVITATION</h2>
        <button class="btn-start" id="startBtn">TAP TO ENTER ❤️</button>
    </div>

    <div id="scene">
        <div id="boot-sequence"></div>
        <h1 id="main-title">Happy Birthday Joydeep ❤️</h1>
        <div id="main-sub" class="subtitle">I love you my litt dinooo <span class="dino-bounce">🦖</span></div>
        <div class="cake" id="the-cake">
            <div class="layer bottom" id="l1"></div>
            <div class="layer middle" id="l2"></div>
            <div class="layer top" id="l3"></div>
            <div class="icing" id="icing"></div>
            <div class="candle" id="the-candle"><div class="flame"></div></div>
        </div>
        <div id="message"></div>
    </div>

    <audio id="music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1808f3030e.mp3" type="audio/mpeg">
    </audio>

            // Unlocks Audio
            const song = document.getElementById('music');
            song.play();
            
            // Switches Screens
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('scene').style.display = 'block';
            
            runSequence();
        });
