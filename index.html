<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --champagne: #f7e7ce; }
        body { margin: 0; background: #0d1117; color: var(--champagne); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; touch-action: manipulation; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        /* Single Sparkle Effect */
        .sparkle { position: fixed; pointer-events: none; color: var(--gold); font-size: 30px; z-index: 9999; animation: sparkleFade 1s ease-out forwards; }
        @keyframes sparkleFade { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Explosion Effect */
        .heart-pop { position: fixed; pointer-events: none; z-index: 10000; animation: popOut 2s ease-out forwards; font-size: 20px; }
        @keyframes popOut {
            0% { transform: translate(0, 0) scale(1) rotate(0); opacity: 1; }
            100% { transform: translate(var(--mx), var(--my)) scale(0) rotate(360deg); opacity: 0; }
        }

        .dino-glow { text-shadow: 0 0 10px var(--gold), 0 0 20px var(--gold); display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        #start-screen { position: fixed; width: 100%; height: 100%; background: #0d1117; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { background: var(--gold); color: #0d1117; padding: 18px 40px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.1rem; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        
        #content { display: none; width: 90%; max-width: 450px; z-index: 10; padding: 25px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .line { font-family: monospace; color: var(--gold); margin: 8px 0; text-align: left; font-size: 0.85rem; }
        
        .bday-title { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.2rem; margin: 10px 0; font-weight: 700; letter-spacing: -1px; }
        
        .cake { position: relative; width: 140px; height: 100px; margin: 20px auto; display: none; }
        .layer { position: absolute; width: 100%; height: 25px; border-radius: 5px; opacity: 0; transition: 0.8s; left:0; }
        .bottom { background: #1a2a3a; bottom: 0; } .middle { background: #243b55; bottom: 25px; } .top { background: #2c5364; bottom: 50px; }
        .icing { position: absolute; width: 100%; height: 8px; background: var(--gold); bottom: 75px; border-radius: 10px; opacity: 0; left:0; }
        .show-layer { opacity: 1 !important; }
        
        .candle { position: absolute; width: 4px; height: 20px; background: white; bottom: 81px; left: 48%; cursor: pointer; opacity:0; transition: 1s; }
        .flame { position: absolute; top: -10px; left: -2px; width: 8px; height: 12px; background: orange; border-radius: 50%; box-shadow: 0 0 10px orange; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) translateX(1px); } }
        
        #message { line-height: 1.8; font-style: italic; margin-top: 15px; font-size: 0.95rem; text-align: justify; }
        .love-center { display: block; text-align: center; font-weight: 600; font-size: 1.1rem; margin-top: 15px; color: var(--gold); font-style: normal; }
        
        .footer { font-size: 0.7rem; opacity: 0; margin-top: 25px; color: var(--gold); font-weight: bold; letter-spacing: 2px; transition: opacity 3s ease-in; }
        #wish-text { font-size: 0.75rem; color: var(--gold); margin: 10px 0; display: none; }
    </style>
</head>
<body onclick="createSparkle(event)" ontouchstart="createSparkle(event)">

<canvas id="starField"></canvas>

<div id="start-screen">
    <h2 style="font-family:'Playfair Display'; letter-spacing:2px; font-style: italic;">A Special Message Awaits</h2>
    <button class="btn" onclick="start()">UNLOCK NOW ❤️</button>
</div>

<div id="content">
    <div id="console"></div>
    <div id="final-gift" style="display:none;">
        <h1 class="bday-title">Happy Birthday Joydeep</h1>
        <div class="cake" id="the-cake">
            <div class="layer bottom" id="l1"></div>
            <div class="layer middle" id="l2"></div>
            <div class="layer top" id="l3"></div>
            <div class="icing" id="icing"></div>
            <div class="candle" id="c1" onclick="blowOut()"><div class="flame" id="flame"></div></div>
        </div>
        <div id="wish-text">Make a wish and tap the flame...</div>
        <div id="message"></div>
        <div id="footer-note" class="footer">MADE WITH LOVE FOR JOYDEEP ❤️</div>
    </div>
</div>

<audio id="bdayMusic" loop preload="auto">
    <source src="mastmaganmusic.mp3" type="audio/mpeg">
</audio>

<script>
    function createSparkle(e) {
        if (e.target.id === 'c1' || e.target.id === 'flame') return;
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        if (!x || !y) return;
        const s = document.createElement('div');
        s.className = 'sparkle'; s.innerHTML = '✨';
        s.style.left = (x - 15) + 'px'; s.style.top = (y - 15) + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1000);
    }

    const canvas = document.getElementById('starField');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function setup() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<45; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(212, 175, 55, 0.4)";
        stars.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y -= 0.15; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(draw);
    }
    setup(); draw();

    function start() {
        document.getElementById('bdayMusic').play().catch(() => {});
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        runConsole();
    }

    function runConsole() {
        const lines = [
            "> [SYSTEM] Initializing Encrypted Link...",
            "> [CHECK] Verifying Identity...",
            "> [SCAN] Scanning for Joydeep...",
            "> [MATCH] 100% Match Found <span class='dino-glow'>🦖</span>",
            "> [STATUS] Loading Sahib Ji Protocol...",
            "> [SUCCESS] Access Granted."
        ];
        const container = document.getElementById('console');
        let i = 0;
        function showLine() {
            if (i < lines.length) {
                let d = document.createElement('div'); d.className = "line"; d.innerHTML = lines[i];
                container.appendChild(d); i++; setTimeout(showLine, 800);
            } else {
                setTimeout(() => { container.style.display = 'none'; showFinal(); }, 800);
            }
        }
        showLine();
    }

    function showFinal() {
        document.getElementById('final-gift').style.display = 'block';
        document.getElementById('the-cake').style.display = 'block';
        ['l1', 'l2', 'l3', 'icing'].forEach((id, index) => {
            setTimeout(() => document.getElementById(id).classList.add('show-layer'), index * 500);
        });
        setTimeout(() => { 
            document.getElementById('c1').style.opacity = 1; 
            typeText();
        }, 2500);
    }

    function typeText() {
        const text = "For me you're the best thing I can ever ask God for. Even tho merese zyada nakhre karte ho but mujhe tumhare nakhre uthna bhi pasand hai. Tumse gussa karna bhi and mere stupid se jokes pe tumhari cute si smile dekhna bhi… and that hot wink. <br><br> <span class='love-center'>I love you my sahib ji 🦖❤️</span>";
        let textIdx = 0;
        const msg = document.getElementById('message');
        msg.innerHTML = "";
        let isTag = false;
        
        function type() {
            if (textIdx < text.length) {
                let char = text.charAt(textIdx);
                if (char === "<") isTag = true;
                if (char === ">") isTag = false;
                msg.innerHTML += char;
                textIdx++;
                if (isTag) type();
                else setTimeout(type, 40);
            } else {
                document.getElementById('wish-text').style.display = 'block';
                setTimeout(() => { document.getElementById('footer-note').style.opacity = 1; }, 500);
            }
        }
        type();
    }

    function blowOut() {
        const flame = document.getElementById('flame');
        if(flame) {
            flame.style.display = 'none';
            document.getElementById('wish-text').innerHTML = "All your wishes are now written in the stars! ✨";
            
            // Magical Fountain Explosion
            const emojis = ['❤️', '✨', '🦖', '⭐', '💖'];
            for(let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'heart-pop';
                    p.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                    p.style.left = '50%';
                    p.style.top = '45%';
                    
                    const moveX = (Math.random() - 0.5) * 400;
                    const moveY = (Math.random() - 0.7) * 500;
                    p.style.setProperty('--mx', `${moveX}px`);
                    p.style.setProperty('--my', `${moveY}px`);
                    
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 2000);
                }, i * 30);
            }
        }
    }
</script>
</body>
</html>
