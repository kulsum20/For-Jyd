<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --champagne: #f7e7ce; --glow-soft: rgba(255, 215, 0, 0.12); }
        body { margin: 0; background: #05070a; color: var(--champagne); font-family: 'Montserrat', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #start-screen { position: fixed; inset: 0; background: #05070a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .unwrap-text { font-family: 'Playfair Display', serif; font-style: italic; letter-spacing: 2px; margin-bottom: 20px; color: var(--gold); }
        .btn { background: var(--gold); border: none; padding: 18px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; color: #0d1117; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; z-index: 10000; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2); }

        #content { 
            display: none; width: 85%; max-width: 380px; z-index: 10; padding: 30px 20px; 
            border-radius: 35px; 
            background: rgba(30, 35, 45, 0.98);
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 215, 0, 0.15); 
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), inset 0 0 20px var(--glow-soft);
        }

        .line { color: var(--gold); font-family: monospace; font-size: 0.8rem; text-align: left; margin: 8px 0; padding-left: 10px; border-left: 1px solid var(--gold); min-height: 1.2em; }

        h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.5rem; color: var(--gold); margin: 0; }
        .dino-bounce { display: inline-block; animation: boing 0.8s infinite alternate ease-in-out; }
        @keyframes boing { from { transform: translateY(0); } to { transform: translateY(-10px); } }

        .cake-container { height: 110px; width: 120px; margin: 30px auto; position: relative; }
        .layer { position: absolute; left: 10px; width: 100px; height: 25px; border-radius: 6px; opacity: 0; transform: translateY(10px); transition: 0.6s ease; }
        .bottom { background: #1a2a3a; bottom: 0; } 
        .mid { background: #243b55; bottom: 25px; } 
        .top { background: #2c5364; bottom: 50px; z-index: 5; }
        .icing { background: var(--gold); height: 8px; width: 108px; bottom: 75px; border-radius: 10px; position: absolute; left: 6px; opacity: 0; transition: 0.6s; box-shadow: 0 0 10px var(--gold); z-index: 6; }
        .visible { opacity: 1 !important; transform: translateY(0) !important; }

        .candle { width: 5px; height: 20px; background: #fff; border-radius: 2px; position: absolute; top: -20px; }
        .flame { position: absolute; top: -12px; left: -2px; width: 9px; height: 13px; background: #ffa500; border-radius: 50%; box-shadow: 0 0 8px #ffcc33; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .fade-in-text { opacity: 0; transition: opacity 1.5s ease-in-out; }
        #wish-box { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.85rem; color: var(--gold); margin: 20px 0; cursor: pointer; }
        #message { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.95rem; line-height: 1.7; text-align: center; min-height: 50px; }
        .footer { font-size: 0.65rem; color: var(--gold); letter-spacing: 2px; margin-top: 30px; font-weight: bold; }

        .sparkle { position: absolute; pointer-events: none; font-size: 20px; z-index: 1000; animation: sparkleOut 0.8s forwards; }
        @keyframes sparkleOut { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body onclick="createSparkle(event)">

<canvas id="starField"></canvas>

<div id="start-screen">
    <div class="unwrap-text">A Gift for my Sahib Ji</div>
    <button class="btn" onclick="startSurprise(event)">START THE MAGIC, SAHIB JI 🪄</button>
</div>

<div id="content">
    <div id="terminal"></div>
    <div id="gift" style="display:none;">
        <h1>Happy Birthday Joydeep ❤️</h1>
        <div style="margin-top:10px;">I love you Litt dino <span class="dino-bounce">🦖</span></div>
        
        <div class="cake-container">
            <div id="l1" class="layer bottom"></div>
            <div id="l2" class="layer mid"></div>
            <div id="l3" class="layer top">
                <div class="candle" style="left: 12px;"><div class="flame"></div></div>
                <div class="candle" style="left: 48px; top: -25px;"><div class="flame"></div></div>
                <div class="candle" style="left: 83px;"><div class="flame"></div></div>
            </div>
            <div id="ic" class="icing"></div>
        </div>

        <div id="wish-box" class="fade-in-text" onclick="blowOut()">Close your eyes & wish upon a star... ✨</div>
        <div id="message"></div>
        <div id="footer-note" class="footer fade-in-text">MADE WITH LOVE FOR JOYDEEP ❤️</div>
    </div>
</div>

<audio id="music" loop preload="auto"><source src="mastmaganmusic.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('starField');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function initStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<40; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.2});
    }
    function drawStars() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
        stars.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y -= 0.15; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(drawStars);
    }
    initStars(); drawStars();

    function createSparkle(e) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.innerHTML = '✨';
        s.style.left = (e.pageX - 10) + 'px';
        s.style.top = (e.pageY - 10) + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 800);
    }

    async function typeLine(text, container) {
        const div = document.createElement('div');
        div.className = "line";
        container.appendChild(div);
        for (let i = 0; i < text.length; i++) {
            div.innerHTML += text[i];
            await new Promise(r => setTimeout(r, 40));
        }
        await new Promise(r => setTimeout(r, 300));
    }

    async function startSurprise(e) {
        if(e) e.stopPropagation();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        
        const audio = document.getElementById('music');
        audio.play().catch(err => console.log("Audio waiting for interaction"));

        const term = document.getElementById('terminal');
        await typeLine("> SYST_CHECK: OPTIMAL...", term);
        await typeLine("> BYPASSING SECURITY...", term);
        await typeLine("> LOADING DATA...", term);
        await typeLine("> SCANNING FOR LITT DINO...", term);
        await typeLine("> MATCH FOUND: JOYDEEP ❤️", term);
        await typeLine("> INIT SAHIB JI PROTOCOL...", term);
        
        setTimeout(showGift, 600);
    }

    function showGift() {
        document.getElementById('terminal').style.display = 'none';
        document.getElementById('gift').style.display = 'block';
        setTimeout(() => document.getElementById('l1').classList.add('visible'), 400);
        setTimeout(() => document.getElementById('l2').classList.add('visible'), 1000);
        setTimeout(() => document.getElementById('l3').classList.add('visible'), 1600);
        setTimeout(() => document.getElementById('ic').classList.add('visible'), 2200);
        setTimeout(() => {
            document.getElementById('wish-box').style.opacity = '1';
            startMessage();
        }, 3000);
    }

    function blowOut() {
        document.querySelectorAll('.flame').forEach(f => f.style.visibility = 'hidden');
        document.getElementById('wish-box').innerText = "Wish sent to the stars... ✨";
    }

    function startMessage() {
        const txt = "For me you're the best thing I can ever ask God for. Even tho merese zyada nakhre karte ho but mujhe tumhare nakhre uthna bhi pasand hai. Tumse gussa karna bhi and mere stupid se jokes pe tumhari cute si smile dekhna bhi… and that hot wink.<br><br><b>I love you my sahib ji ❤️</b>";
        let i = 0;
        const target = document.getElementById('message');
        function type() {
            if(i < txt.length) {
                if(txt.charAt(i) === '<') { i = txt.indexOf('>', i) + 1; } 
                else { i++; }
                target.innerHTML = txt.substring(0, i);
                setTimeout(type, 50);
            } else {
                document.getElementById('footer-note').style.opacity = '1';
            }
        }
        type();
    }
</script>
</body>
</html>
