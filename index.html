<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ffcc33; 
            --champagne: #f7e7ce; 
            --glow: rgba(255, 204, 51, 0.7); 
        }
        
        body { 
            margin: 0; background: #080a0f; color: var(--champagne); 
            font-family: 'Montserrat', sans-serif; display: flex; 
            justify-content: center; align-items: center; height: 100vh; 
            text-align: center; overflow: hidden; touch-action: manipulation; 
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        /* UNWRAP SCREEN */
        #start-screen { position: fixed; inset: 0; background: #080a0f; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .unwrap-text { font-family: 'Playfair Display', serif; font-style: italic; letter-spacing: 2px; margin-bottom: 20px; color: var(--gold); }
        .btn { background: var(--gold); border: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; color: #0d1117; font-size: 0.9rem; box-shadow: 0 0 15px rgba(255, 204, 51, 0.4); text-transform: uppercase; letter-spacing: 1px; }

        /* THE BOX - Enhanced for Vibrancy */
        #content { 
            display: none; width: 88%; max-width: 380px; z-index: 10; padding: 25px; 
            border-radius: 20px; 
            background: linear-gradient(145deg, rgba(25, 30, 40, 0.98), rgba(10, 12, 18, 0.99));
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 204, 51, 0.25);
            position: relative; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .header-section { margin-bottom: 20px; position: relative; }
        .header-main { display: flex; align-items: center; justify-content: center; white-space: nowrap; gap: 8px; }
        h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1.2rem, 5vw, 1.65rem); color: var(--gold); margin: 0; text-shadow: 0 0 10px rgba(255, 204, 51, 0.25); }
        
        /* GLOW & BOUNCE FOR BOTH EMOJIS */
        .glow-bounce { 
            display: inline-block;
            filter: drop-shadow(0 0 12px var(--glow)); 
            animation: boing 0.8s infinite alternate ease-in-out; 
        }
        @keyframes boing { from { transform: translateY(0); } to { transform: translateY(-8px); } }

        .subheader { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; color: var(--champagne); opacity: 0.95; margin-top: 8px; }

        /* SPARKLES INSIDE BOX */
        .sparkle { position: absolute; pointer-events: none; color: var(--gold); font-size: 20px; z-index: 100; animation: sparkleFade 1s ease-out forwards; }
        @keyframes sparkleFade { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* CAKE & MAGICAL GLOW */
        .cake-container { height: 95px; width: 120px; margin: 25px auto; position: relative; }
        .cake-container::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px; background: radial-gradient(circle, rgba(255, 204, 51, 0.15) 0%, transparent 70%);
            z-index: -1;
        }
        .layer { position: absolute; left: 10px; width: 100px; height: 20px; border-radius: 4px; opacity: 0; transform: translateY(15px); transition: 0.8s ease; }
        .bottom { background: #1a2a3a; bottom: 0; } .mid { background: #243b55; bottom: 20px; } .top { background: #2c5364; bottom: 40px; }
        .icing { background: var(--gold); height: 5px; width: 100px; bottom: 60px; border-radius: 10px; position: absolute; left: 10px; opacity: 0; transition: 0.8s; }
        .visible { opacity: 1 !important; transform: translateY(0) !important; }

        .candle { position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); width: 4px; height: 16px; background: white; opacity: 0; transition: 1s; cursor: pointer; }
        .flame { position: absolute; top: -9px; left: -2px; width: 8px; height: 10px; background: orange; border-radius: 50%; box-shadow: 0 0 12px orange; animation: flicker 0.1s infinite; }

        /* TEXT AREAS */
        #wish-box { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; color: var(--gold); margin: 20px 0; opacity: 0; }
        .fade-heartbeat { animation: heartbeatFade 3s infinite ease-in-out; }
        @keyframes heartbeatFade { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        #message { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.95rem; line-height: 1.8; opacity: 0; transition: opacity 2s ease; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .footer { font-size: 0.65rem; color: var(--gold); letter-spacing: 2px; opacity: 0; transition: 3s; margin-top: 25px; font-weight: bold; }
        .line { color: var(--gold); font-family: monospace; font-size: 0.75rem; text-align: left; margin: 8px 0; border-left: 2px solid var(--gold); padding-left: 8px; }
    </style>
</head>
