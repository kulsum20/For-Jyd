<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@1,600;1,800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --champagne: #f7e7ce; }
        body { margin: 0; background: #0d1117; color: var(--champagne); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; touch-action: manipulation; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        .sparkle { position: fixed; pointer-events: none; color: var(--gold); font-size: 30px; z-index: 9999; animation: sparkleFade 1s ease-out forwards; }
        @keyframes sparkleFade { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .smoke { position: fixed; pointer-events: none; z-index: 10000; font-size: 25px; filter: blur(3px); animation: smokeFly 2.5s ease-out forwards; }
        @keyframes smokeFly {
            0% { transform: translate(-50%, 0) scale(1); opacity: 0.6; }
            100% { transform: translate(var(--sx), var(--sy)) scale(4); opacity: 0; }
        }

        /* Beautiful New Header Font */
        .bday-title { 
            font-family: 'Playfair Display', serif; 
            color: var(--gold); 
            font-size: 2.2rem; 
            margin: 0 0 10px 0; 
            font-weight: 800; 
            font-style: italic;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            letter-spacing: -0.5px;
        }
        .title-emojis { font-size: 1.5rem; vertical-align: middle; margin-left: 5px; }

        #start-screen { position: fixed; width: 100%; height: 100%; background: #0d1117; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { background: transparent; color: var(--gold); padding: 15px 35px; border-radius: 2px; border: 1px solid var(--gold); font-weight: bold; font-size: 0.9rem; cursor: pointer; letter-spacing: 3px; transition: 0.3s; }
        .btn:active { background: var(--gold); color: #0d1117; }
        
        #content { display: none; width: 85%; max-width: 400px; z-index: 10; padding: 30px; background: rgba(13, 17, 23, 0.85); backdrop-filter: blur(15px); border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .line { font-family: monospace; color: var(--gold); margin: 10px 0; text-align: left; font-size: 0.8rem; opacity: 0.7; }
        
        .cake { position: relative; width: 100px; height: 80px; margin: 25px auto; display: none; }
        .layer { position: absolute; width: 100%; height: 20px; border-radius: 3px; opacity: 0; transition: 1s; left:0; border: 0.5px solid rgba(212,175,55,0.2); }
        .bottom { background: #1a2a3a; bottom: 0; } .middle { background: #243b55; bottom: 20px; } .top { background: #2c5364; bottom: 40px; }
        .icing { position: absolute; width: 100%; height: 5px; background: var(--gold); bottom: 60px; border-radius: 2px; opacity: 0; left:0; }
        .show-layer { opacity: 1 !important; }
        
        .candle { position: absolute; width: 3px; height: 18px; background: #fff; bottom: 65px; left: 48.5%; cursor: pointer; opacity:0; transition: 1s; box-shadow: 0 0 5px rgba(255,255,255,0.5); }
        .flame { position: absolute; top: -10px; left: -3px; width: 9px; height: 12px; background: radial-gradient(#fff, #ff9d00, #ff4500); border-radius: 50%; box-shadow: 0 0 15px #ff9d00; animation: flicker 0.1s infinite; }
        @keyframes flicker { 0% { transform: scale(1) rotate(-1deg); } 50% { transform: scale(1.1) rotate(1deg); } 100% { transform: scale(1) rotate(-1deg); } }
        
        #message { line-height: 2; font-style: italic; margin-top: 25px; font-size: 0.92rem; text-align: center; color: #fff; letter-spacing: 0.2px; }
        .love-center { display: block; font-weight: 600; font-size: 1.1rem; margin-top: 20px; color: var(--gold); font-style: normal; letter-spacing: 1px; }
        
        .footer { font-size: 0.65rem; opacity: 0; margin-top: 35px; color: var(--gold); letter-spacing: 4px; transition: 4s; font-weight: 500; }
        #wish-text { font-size: 0.75rem; color: var(--gold); margin: 15px 0; display: none; font-family: 'Playfair Display', serif; font-style: italic; }
    </style>
</head>
<body onclick="createSparkle(event)" ontouchstart="createSparkle(event)">

<canvas id="starField"></canvas>

<div id="start-screen">
    <h2 style="font-family:'Playfair Display', serif; letter-spacing:5px; font-weight:300; font-style: italic; margin-bottom:40px;">PRIVATE MESSAGE</h2>
    <button class="btn" onclick="start()">OPEN</button>
</div>

<div id="content">
    <div id="console"></div>
    <div id="final-gift" style="display:none;">
        <h1 class="bday-title">Happy Birthday Joydeep <span class="title-emojis">🦖❤️</span></h1>
        
        <div class="cake" id="the-cake">
            <div class="layer bottom" id="l1"></div>
            <div class="layer middle" id="l2"></div>
            <div class="layer top" id="l3"></div>
            <div class="icing" id="icing"></div>
            <div class="candle" id="c1" onclick="blowOut()"><div class="flame" id="flame"></div></div>
        </div>
        
        <div id="wish-text">Make a wish...</div>
        <div id="message"></div>
        <div id="footer-note" class="footer">MADE WITH LOVE</div>
    </div>
</div>

<audio id="bdayMusic" loop preload="auto">
    <source src="mastmaganmusic.mp3" type="audio/mpeg">
</audio>

<script>
    function createSparkle(e) {
        if (e.target.id === 'c1' || e.target.id === 'flame') return;
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        if (!x || !y) return;
        const s = document.createElement('div');
        s.className = 'sparkle'; s.innerHTML = '✧';
        s.style.left = (x - 15) + 'px'; s.style.top = (y - 15) + 'px';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 1000);
    }

    const canvas = document.getElementById('starField');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function setup() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<40; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.2});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "rgba(212, 175, 55, 0.35)";
        stars.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y -= 0.12; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(draw);
    }
    setup(); draw();

    function start() {
        document.getElementById('bdayMusic').play().catch(() => {});
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        runConsole();
    }

    function runConsole() {
        const lines = ["> SYST_INIT...", "> SCANNING...", "> MATCH: JOYDEEP 🦖", "> LOADING..."];
        const container = document.getElementById('console');
        let i = 0;
        function showLine() {
            if (i < lines.length) {
                let d = document.createElement('div'); d.className = "line"; d.innerHTML = lines[i];
                container.appendChild(d); i++; setTimeout(showLine, 800);
            } else {
                setTimeout(() => { container.style.display = 'none'; showFinal(); }, 800);
            }
        }
        showLine();
    }

    function showFinal() {
        document.getElementById('final-gift').style.display = 'block';
        document.getElementById('the-cake').style.display = 'block';
        ['l1', 'l2', 'l3', 'icing'].forEach((id, index) => {
            setTimeout(() => document.getElementById(id).classList.add('show-layer'), index * 400);
        });
        setTimeout(() => { 
            document.getElementById('c1').style.opacity = 1; 
            typeText();
        }, 2000);
    }

        let textIdx = 0;
