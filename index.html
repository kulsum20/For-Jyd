<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --champagne: #f7e7ce; --glow-inner: rgba(255, 215, 0, 0.35); }
        body { margin: 0; background: #05070a; color: var(--champagne); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; touch-action: manipulation; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        #start-screen { position: fixed; inset: 0; background: #05070a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .unwrap-text { font-family: 'Playfair Display', serif; font-style: italic; letter-spacing: 2px; margin-bottom: 20px; color: var(--gold); }
        .btn { background: var(--gold); border: none; padding: 15px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; color: #0d1117; font-size: 0.9rem; box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); text-transform: uppercase; letter-spacing: 1px; }

        #content { 
            display: none; width: 88%; max-width: 380px; z-index: 10; padding: 30px 25px; 
            border-radius: 35px; 
            background: linear-gradient(145deg, rgba(60, 65, 80, 0.98), rgba(10, 12, 18, 1));
            backdrop-filter: blur(25px); 
            border: 2px solid rgba(255, 215, 0, 0.7); 
            position: relative; overflow: hidden;
            box-shadow: 0 30px 90px rgba(0,0,0,1), inset 0 0 50px var(--glow-inner);
        }

        .line { color: var(--gold); font-family: monospace; font-size: 0.85rem; text-align: left; margin: 10px 0; padding-left: 10px; border-left: 2px solid var(--gold); min-height: 1.2em; }

        .header-section { margin-bottom: 20px; }
        h1 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.6rem; color: var(--gold); margin: 0; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        
        .heart-glow { filter: drop-shadow(0 0 12px rgba(255, 77, 77, 0.9)); display: inline-block; margin-left: 5px; }
        .dino-bounce { display: inline-block; animation: boing 0.8s infinite alternate ease-in-out; filter: drop-shadow(0 0 10px var(--gold)); }
        @keyframes boing { from { transform: translateY(0); } to { transform: translateY(-12px); } }

        .subheader { font-family: 'Montserrat', sans-serif; font-size: 1.15rem; color: var(--champagne); margin-top: 10px; font-weight: 400; }

        .cake-container { height: 100px; width: 120px; margin: 40px auto; position: relative; }
        .layer { position: absolute; left: 10px; width: 100px; height: 20px; border-radius: 4px; opacity: 0; transform: translateY(15px); transition: 0.8s ease; }
        .bottom { background: #1a2a3a; bottom: 0; } 
        .mid { background: #243b55; bottom: 20px; } 
        .top { background: #2c5364; bottom: 40px; display: flex; justify-content: space-around; align-items: flex-end; padding: 0 10px; }
        .icing { background: var(--gold); height: 6px; width: 100px; bottom: 60px; border-radius: 10px; position: absolute; left: 10px; opacity: 0; transition: 0.8s; box-shadow: 0 0 15px var(--gold); }
        .visible { opacity: 1 !important; transform: translateY(0) !important; }

        .candle { width: 5px; height: 18px; background: #fff; border-radius: 2px; position: relative; margin-bottom: 20px; display: flex; justify-content: center; }
        .flame { 
            position: absolute; top: -11px; width: 9px; height: 12px; background: #ffa500; border-radius: 50%; 
            box-shadow: 0 0 12px #ffcc33; animation: flicker 0.15s infinite; 
        }
        @keyframes flicker { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.25); } }

        #wish-box { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.95rem; color: var(--gold); margin: 25px 0; opacity: 0; cursor: pointer; }
        #message { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1rem; line-height: 1.8; opacity: 0; transition: opacity 2s ease; }
        .footer { font-size: 0.7rem; color: var(--gold); letter-spacing: 2px; opacity: 0; transition: 3s; margin-top: 35px; font-weight: bold; }
        
        .sparkle { position: absolute; pointer-events: none; color: var(--gold); font-size: 20px; z-index: 100; animation: sparkleFade 1s ease-out forwards; }
        @keyframes sparkleFade { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
    </style>
</head>
<body onclick="handleTap(event)">

<canvas id="starField"></canvas>

<div id="start-screen">
    <div class="unwrap-text">A Gift for my Sahib Ji</div>
    <button class="btn" onclick="startSurprise()">START THE MAGIC, SAHIB JI 🪄</button>
</div>

<div id="content">
    <div id="terminal"></div>
    <div id="gift" style="display:none;">
        <div class="header-section">
            <div class="header-main" style="display:flex; align-items:center; justify-content:center;">
                <h1>Happy Birthday Joydeep</h1>
                <span class="heart-glow" style="font-size:1.4rem;">❤️</span>
            </div>
            <div class="subheader">I love you Litt dino <span class="dino-bounce" style="font-size:1.4rem;">🦖</span></div>
        </div>
        
        <div class="cake-container">
            <div id="l1" class="layer bottom"></div>
            <div id="l2" class="layer mid"></div>
            <div id="l3" class="layer top">
                <div class="candle"><div class="flame" id="f1"></div></div>
                <div class="candle" style="margin-bottom: 23px;"><div class="flame" id="f2"></div></div>
                <div class="candle"><div class="flame" id="f3"></div></div>
            </div>
            <div id="ic" class="icing"></div>
        </div>

        <div id="wish-box" onclick="blowOut()">Close your eyes & wish upon a star... ✨</div>
        <div id="message"></div>
        <div id="footer-note" class="footer">MADE WITH LOVE FOR JOYDEEP ❤️</div>
    </div>
</div>

<audio id="music" loop preload="auto"><source src="mastmaganmusic.mp3" type="audio/mpeg"></audio>

<script>
    const canvas = document.getElementById('starField');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function setupStars() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<60; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5});
    }
    function drawStars() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255, 215, 0, 0.5)";
        stars.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y -= 0.15; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(drawStars);
    }
    setupStars(); drawStars();

    function handleTap(e) {
        const box = document.getElementById('content');
        if (box.style.display === 'block') {
            const rect = box.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                const s = document.createElement('div');
                s.className = 'sparkle'; s.innerHTML = '✨';
                s.style.left = (e.clientX - rect.left) + 'px';
                s.style.top = (e.clientY - rect.top) + 'px';
                box.appendChild(s);
                setTimeout(() => s.remove(), 1000);
            }
        }
    }

    async function typeLine(text, container, shouldPlayMusic = false) {
        const div = document.createElement('div');
        div.className = "line";
        container.appendChild(div);
        for (let i = 0; i < text.length; i++) {
            div.innerHTML += text[i];
            await new Promise(r => setTimeout(r, 45));
        }
        if (shouldPlayMusic) document.getElementById('music').play().catch(() => {});
        await new Promise(r => setTimeout(r, 500));
    }

    async function startSurprise() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        const term = document.getElementById('terminal');
        const lines = [
            { t: "> SYST_CHECK: OPTIMAL...", m: true }, 
            { t: "> BYPASSING SECURITY...", m: false },
            { t: "> LOADING DATA...", m: false },
            { t: "> SCANNING FOR LITT DINO...", m: false },
            { t: "> MATCH FOUND: JOYDEEP ❤️", m: false },
            { t: "> INIT SAHIB JI PROTOCOL...", m: false }
        ];
        for (let line of lines) { await typeLine(line.t, term, line.m); }
        setTimeout(triggerGift, 800);
    }

    function triggerGift() {
        const term = document.getElementById('terminal');
        term.style.transition = "opacity 1s";
        term.style.opacity = "0";
        setTimeout(() => {
            term.style.display = 'none';
            document.getElementById('gift').style.display = 'block';
            setTimeout(() => document.getElementById('l1').classList.add('visible'), 500);
            setTimeout(() => document.getElementById('l2').classList.add('visible'), 1200);
            setTimeout(() => document.getElementById('l3').classList.add('visible'), 1900);
            setTimeout(() => document.getElementById('ic').classList.add('visible'), 2600);
            setTimeout(() => {
                document.getElementById('wish-box').style.opacity = '1';
                document.getElementById('message').style.opacity = '1';
                typeMsg();
            }, 3500);
        }, 1000);
    }

    function blowOut() {
        document.getElementById('f1').style.display = 'none';
        document.getElementById('f2').style.display = 'none';
        document.getElementById('f3').style.display = 'none';
        document.getElementById('wish-box').innerText = "Wish sent to the stars for you... ✨";
    }

    function typeMsg() {
        const txt = "For me you're the best thing I can ever ask God for. Even tho merese zyada nakhre karte ho but mujhe tumhare nakhre uthna bhi pasand hai.<br><br><b>I love you my sahib ji ❤️</b><br><br>Tumse gussa karna bhi and mere stupid se jokes pe tumhari cute si smile dekhna bhi… and that hot wink.";
        let i = 0; const target = document.getElementById('message');
        function type() {
            if(i < txt.length) {
                if(txt.charAt(i) === '<') { i = txt.indexOf('>', i) + 1; } 
                else if(txt.charAt(i) === '&') { i = txt.indexOf(';', i) + 1; }
                else { i++; }
                target.innerHTML = txt.substring(0, i);
                setTimeout(type, 50);
            } else { document.getElementById('footer-note').style.opacity = '1'; }
        }
        type();
    }
</script>
</body>
</html>
