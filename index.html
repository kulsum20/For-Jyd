<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Joydeep</title>
    <style>
        body { margin: 0; background: #0d1117; color: #f7e7ce; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; }
        #start-screen { position: fixed; width: 100%; height: 100%; background: #0d1117; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .btn { background: #d4af37; color: #0d1117; padding: 15px 30px; border-radius: 25px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        #content { display: none; width: 90%; max-width: 400px; }
        .line { font-family: monospace; color: #d4af37; margin: 10px 0; text-align: left; }
        h1 { color: #d4af37; font-size: 1.5rem; margin-top: 20px; }
        #message { line-height: 1.6; font-style: italic; margin-top: 20px; font-size: 0.95rem; }
    </style>
</head>
<body>

<div id="start-screen">
    <button class="btn" onclick="start()">TAP TO ENTER ❤️</button>
</div>

<div id="content">
    <div id="console"></div>
    <div id="final-gift" style="display:none;">
        <h1>Happy Birthday Joydeep! 🦖</h1>
        <div id="message"></div>
    </div>
</div>

<script>
    function start() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        runConsole();
    }

    function runConsole() {
        const lines = [
            "> Initializing...",
            "> Scanning for Joydeep...",
            "> 100% Match Found 🦖",
            "> Loading Sahib Ji Protocol..."
        ];
        const container = document.getElementById('console');
        let i = 0;
        function showLine() {
            if (i < lines.length) {
                let d = document.createElement('div');
                d.className = "line";
                d.innerHTML = lines[i];
                container.appendChild(d);
                i++;
                setTimeout(showLine, 1000);
            } else {
                setTimeout(() => {
                    container.style.display = 'none';
                    showFinal();
                }, 1000);
            }
        }
        showLine();
    }

    function showFinal() {
        document.getElementById('final-gift').style.display = 'block';
        const text = "For me you're the best thing I can ever ask God for. Even tho merese zyada nakhre karte ho but mujhe tumhare nakhre uthna bhi pasand hai. Tumse gussa karna bhi and mere stupid se jokes pe tumhari cute si smile dekhna bhi… and that hot wink. I love you my sahib ji ❤️";
        let j = 0;
        const msg = document.getElementById('message');
        function type() {
            if (j < text.length) {
                msg.innerHTML += text.charAt(j);
                j++;
                setTimeout(type, 40);
            }
        }
        type();
    }
</script>

</body>
</html>
