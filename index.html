<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Joydeep 🦖❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --champagne: #f7e7ce; }
        body { margin: 0; background: #0d1117; color: var(--champagne); font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; touch-action: manipulation; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        /* Sparkle Animation */
        .sparkle { position: fixed; pointer-events: none; color: var(--gold); font-size: 20px; z-index: 9999; animation: sparkleFly 1.5s ease-out forwards; }
        @keyframes sparkleFly { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

        #start-screen { position: fixed; width: 100%; height: 100%; background: #0d1117; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { background: var(--gold); color: #0d1117; padding: 18px 40px; border-radius: 50px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); z-index: 101; }
        
        #content { display: none; width: 90%; max-width: 450px; z-index: 10; padding: 25px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); }
        .line { font-family: monospace; color: var(--gold); margin: 10px 0; text-align: left; line-height: 1.8; }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.6rem; margin: 10px 0; }
        
        .cake { position: relative; width: 140px; height: 120px; margin: 20px auto; display: none; }
        .layer { position: absolute; width: 100%; height: 25px; border-radius: 5px; opacity: 0; transform: translateY(10px); transition: 0.8s; left:0; }
        .bottom { background: #1a2a3a; bottom: 0; } .middle { background: #243b55; bottom: 25px; } .top { background: #2c5364; bottom: 50px; }
        .icing { position: absolute; width: 100%; height: 8px; background: var(--gold); bottom: 75px; border-radius: 10px; opacity: 0; transition: 0.8s; left:0; }
        .show-layer { opacity: 1 !important; transform: translateY(0) !important; }
        .candle { position: absolute; width: 4px; height: 20px; background: white; bottom: 81px; opacity: 0; transition: 1s; left: 48%; }
        .flame { position: absolute; top: -10px; left: -2px; width: 8px; height: 10px; background: orange; border-radius: 50%; box-shadow: 0 0 10px orange; }
        
        #message { line-height: 1.6; font-style: italic; margin-top: 15px; font-size: 0.95rem; }
        .footer { font-size: 0.75rem; opacity: 0; transition: 2s; margin-top: 20px; color: var(--gold); letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body onmousedown="createSparkle(event)" ontouchstart="createSparkle(event)">

<canvas id="starField"></canvas>

<div id="start-screen">
    <h2 style="font-family:'Playfair Display'; letter-spacing:4px; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:30px;">OPEN INVITATION</h2>
    <button class="btn" onclick="start()">TAP TO ENTER ❤️</button>
</div>

<div id="content">
    <div id="console"></div>
    <div id="final-gift" style="display:none;">
        <h1>Happy Birthday Joydeep ❤️</h1>
        <div class="cake" id="the-cake">
            <div class="layer bottom" id="l1"></div>
            <div class="layer middle" id="l2"></div>
            <div class="layer top" id="l3"></div>
            <div class="icing" id="icing"></div>
            <div class="candle" id="c1"><div class="flame"></div></div>
        </div>
        <div id="message"></div>
        <div id="footer-note" class="footer">MADE WITH LOVE FOR JOYDEEP ❤️</div>
    </div>
</div>

<audio id="bdayMusic" loop preload="auto">
    <source src="https://www.pagalworld.com.sb/files/download/id/1944" type="audio/mpeg">
</audio>

<script>
    // Tap Sparkle Logic
    function createSparkle(e) {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        for (let i = 0; i < 6; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.innerHTML = ['✨', '⭐', '💫'][Math.floor(Math.random() * 3)];
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            const tx = (Math.random() - 0.5) * 200;
            const ty = (Math.random() - 0.5) * 200;
            s.style.setProperty('--tx', `${tx}px`);
            s.style.setProperty('--ty', `${ty}px`);
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1500);
        }
    }

    // Star Background
    const canvas = document.getElementById('starField');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function setup() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<45; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5});
    }
    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(212, 175, 55, 0.4)";
        stars.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
            p.y -= 0.15; if(p.y < 0) p.y = canvas.height;
        });
        requestAnimationFrame(draw);
    }
    setup(); draw();

    function start() {
        const music = document.getElementById('bdayMusic');
        music.play().catch(() => console.log("Audio ready"));
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        runConsole();
    }

    function runConsole() {
        const lines = ["> Initializing Protocol...", "> Searching database...", "> Match Found: Joydeep 🦖", "> Status: Sahib Ji Mode ACTIVE ❤️"];
        const container = document.getElementById('console');
        let i = 0;
        function showLine() {
            if (i < lines.length) {
                let d = document.createElement('div'); d.className = "line"; d.innerHTML = lines[i];
                container.appendChild(d); i++; setTimeout(showLine, 1000);
            } else {
                setTimeout(() => { container.style.display = 'none'; showFinal(); }, 800);
            }
        }
        showLine();
    }

    function showFinal() {
        document.getElementById('final-gift').style.display = 'block';
        document.getElementById('the-cake').style.display = 'block';
        ['l1', 'l2', 'l3', 'icing'].forEach((id, index) => {
            setTimeout(() => document.getElementById(id).classList.add('show-layer'), index * 500);
        });
        setTimeout(() => {
            document.getElementById('c1').style.opacity = 1;
            typeText();
        }, 2500);
    }

    function typeText() {
        const text = "For me you're the best thing I can ever ask God for. Even tho merese zyada nakhre karte ho but mujhe tumhare nakhre uthna bhi pasand hai. Tumse gussa karna bhi and mere stupid se jokes pe tumhari cute si smile dekhna bhi… and that hot wink. I love you my sahib ji ❤️";
        let j = 0;
        const msg = document.getElementById('message');
        function type() {
            if (j < text.length) {
                msg.innerHTML += text.charAt(j); j++; setTimeout(type, 40);
            } else {
                setTimeout(() => { document.getElementById('footer-note').style.opacity = 1; }, 1000);
            }
        }
        type();
    }
</script>
</body>
</html>
